services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: plutus-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-plutus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-plutus-dev-secret}
    command: server /data --console-address ":9001"
    volumes:
      - plutus-minio-data:/data

volumes:
  plutus-minio-data: