{% extends "base.html" %}
{% block body %}
<div class="card" style="max-width:480px">
  <h2 style="margin-top:0">Sign in</h2>
  {% if login_error %}<p class="err">{{ login_error }}</p>{% endif %}
  <form method="post" action="/ui/saas/login">
    <label>API key or admin token
      <input type="password" name="api_token" required autocomplete="current-password" placeholder="plutus_tk_… or admin token">
    </label>
  <p class="small" style="margin:.5rem 0 1rem">Tenants use <code>plutus_tk_&lt;tenant&gt;_…</code> keys issued from the dashboard.</p>
  <button type="submit">Continue</button>
  </form>
  {% if signup_enabled %}
  <p class="small" style="margin-top:1rem">New studio? <a href="/ui/saas/signup">Start free trial</a></p>
  {% endif %}
</div>
{% endblock %}
