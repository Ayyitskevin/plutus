app = "plutus"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PLUTUS_HOST = "0.0.0.0"
  PLUTUS_PORT = "8031"
  PLUTUS_DATA_DIR = "/data"

[http_service]
  internal_port = 8031
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "plutus_data"
  destination = "/data"
  initial_size = "1gb"